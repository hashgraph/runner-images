name: "ZXC: Build ScaleSet Images"
# This reusable component is called by the following workflows:
# - .github/workflows/flow-pull-request-checks.yaml
# - .github/workflows/flow-build-application.yaml

on:
  workflow_call:
    inputs:
      ## Base Operating System Image
      ## Options include:
      ## - ubuntu-22.04
      ## - ubuntu-24.04
      ## - debian-bookworm
      ## - chainguard-wolfi
      base-os-image:
        description: "Operating System Image:"
        type: string
        required: true

      ## The tag version to be used
      tag-version:
        description: "Tag Version:"
        type: string
        required: true

      ## Upstream Github Action Runner Version
      runner-version:
        description: "Runner Version:"
        type: string
        required: true

      ## Upstream Github Action Runner Container Hooks Version
      runner-container-hooks-version:
        description: "Container Hooks Version:"
        type: string
        required: false
        default: "0.8.0"

      ## Upstream Docker Version
      docker-version:
        description: "Docker Version:"
        type: string
        required: false
        default: "29.1.3"

      ## Upstream Docker Buildx Version
      docker-buildx-version:
        description: "Docker Buildx Version:"
        type: string
        required: false
        default: "0.32.1"

      # Upstream Github CLI Version
      gh-cli-version:
        description: "Github CLI Version:"
        type: string
        required: false
        default: "2.54.0"

      ## Linux Architectures for Multi-Arch Builds
      platforms:
        description: "Platforms:"
        type: string
        required: false
        default: "linux/amd64"

      dry-run-enabled:
        description: "Perform Dry Run"
        type: boolean
        required: false
        default: false

      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Build"

defaults:
  run:
    shell: bash

env:
  TOOL_CACHE_ARTIFACT_NAME: "tool-cache.tar.gz"

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  create-tool-cache:
    name: Create Tool Cache
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install WGet
        run: sudo apt update && sudo apt install -y --no-install-recommends wget

      - name: Clear Hosted Tool Cache
        run: rm -rvf "${{ runner.tool_cache }}"/*

      - name: Setup Google Cloud SDK
        uses: step-security/setup-gcloud@eca4ba5778ff559fbc5cb59ab4db7ecdcf779b98 # v3.0.1

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25.0.2"

      - name: Setup NodeJS 22
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Setup NodeJS 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Setup GoLang 1.25
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25"

      - name: Setup Python 3.12.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true

      - name: Setup Helm Latest
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Setup Docker Buildx Support
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0
        with:
          version: v0.32.1
          driver-opts: network=host,image=ghcr.io/hashgraph/runner-images/buildkit:buildx-stable-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Archive Tool Cache
        working-directory: ${{ runner.tool_cache }}
        run: tar -czf ${{ env.TOOL_CACHE_ARTIFACT_NAME }} *

      - name: Upload Tool Cache
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "ScaleSet Tools (${{ inputs.base-os-image }})"
          retention-days: 1
          path: ${{ runner.tool_cache }}/${{ env.TOOL_CACHE_ARTIFACT_NAME }}

  build-scaleset-images:
    name: ${{ inputs.custom-job-label || 'Build' }}
    runs-on: ubuntu-24.04
    needs:
      - create-tool-cache
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Tool Cache
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: "ScaleSet Tools (${{ inputs.base-os-image }})"
          path: ${{ github.workspace }}/scaleset/runner/tools

      - name: Unpack Tool Cache
        run: |
          tar -xzf ${{ github.workspace }}/scaleset/runner/tools/${{ env.TOOL_CACHE_ARTIFACT_NAME }} -C ${{ github.workspace }}/scaleset/runner/tools/
          rm -f ${{ github.workspace }}/scaleset/runner/tools/${{ env.TOOL_CACHE_ARTIFACT_NAME }}

      - name: Setup QEmu Support
        uses: step-security/setup-qemu-action@109c6ed9f089be1a250c75fd6a534e30df44e030 # v4.0.0

      - name: Setup Docker Buildx Support
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0
        with:
          version: v0.32.1
          driver-opts: network=host,image=ghcr.io/hashgraph/runner-images/buildkit:buildx-stable-1

      - name: Show Docker Version
        run: docker version

      - name: Show Docker Info
        run: docker info

      - name: Setup JFrog CLI
        id: jfrog-cli
        uses: jfrog/setup-jfrog-cli@c32bf10843e4071112c4ea3abf622d3b27cd8c17 # v4.7.0
        if: ${{ inputs.base-os-image == 'chainguard-wolfi' }}
        env:
          JF_URL: https://${{ vars.JF_SERVER_NAME }}/
        with:
          oidc-provider-name: hashgraph

      - name: Show JFrog Config
        if: ${{ inputs.base-os-image == 'chainguard-wolfi' }}
        run: jf config show

      - name: Verify JFrog Connectivity
        if: ${{ inputs.base-os-image == 'chainguard-wolfi' }}
        run: jf rt ping

      - name: Docker Login (Artifactory)
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        if: ${{ inputs.base-os-image == 'chainguard-wolfi' }}
        with:
          registry: ${{ vars.JF_SERVER_NAME }}
          username: ${{ steps.jfrog-cli.outputs.oidc-user }}
          password: ${{ steps.jfrog-cli.outputs.oidc-token }}

      - name: Docker Login (Github)
        uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        if: ${{ inputs.dry-run-enabled != true }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Docker Registry
        id: registry
        run: |
          DOCKER_REGISTRY_PREFIX="ghcr.io/${{ github.repository }}"
          IMG_RESULT="push"

          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            DOCKER_REGISTRY_PREFIX="local"
            IMG_RESULT="cache"
          fi

          echo "prefix=${DOCKER_REGISTRY_PREFIX}" >>"${GITHUB_OUTPUT}"
          echo "operation=${IMG_RESULT}" >>"${GITHUB_OUTPUT}"

      - name: Calculate Docker Tag
        id: docker-tag
        run: |
          TAG_VERSION="${{ inputs.tag-version || inputs.runner-version }}"
          echo "version=${TAG_VERSION//+/-}" >>"${GITHUB_OUTPUT}"

      - name: Build Image
        uses: step-security/docker-build-push-action@846549baaf047e867d038826129a64d81df0f704 # v7.1.0
        with:
          context: ${{ github.workspace }}/scaleset/runner
          file: ${{ case(inputs.base-os-image == 'chainguard-wolfi', format('{0}/scaleset/runner/Dockerfile.chainguard', github.workspace), format('{0}/scaleset/runner/Dockerfile', github.workspace)) }}
          platforms: ${{ inputs.platforms }}
          push: ${{ steps.registry.outputs.operation == 'push' }}
          load: ${{ steps.registry.outputs.operation == 'load' }}
          tags: |
            ${{ steps.registry.outputs.prefix }}/scaleset-runner:${{ inputs.base-os-image }}
            ${{ steps.registry.outputs.prefix }}/scaleset-runner:v${{ steps.docker-tag.outputs.version }}-${{ inputs.base-os-image }}
          build-args: |
            TARGET_OS=linux
            TARGET_ARCH=amd64
            RUNNER_VERSION=${{ inputs.runner-version }}
            RUNNER_CONTAINER_HOOKS_VERSION=${{ inputs.runner-container-hooks-version }}
            DOCKER_VERSION=${{ inputs.docker-version }}
            BUILDX_VERSION=${{ inputs.docker-buildx-version }}
            GH_CLI_VERSION=${{ inputs.gh-cli-version }}
            BASE_OS_VERSION=${{ case(inputs.base-os-image == 'debian-bookworm', 'bookworm-slim', inputs.base-os-image == 'ubuntu-22.04', 'jammy', inputs.base-os-image == 'ubuntu-24.04', 'noble', inputs.base-os-image == 'chainguard-wolfi', 'dev', 'unknown') }}
